[build]
command = "npm run build"
functions = "netlify/functions"
publish = ".next"

[build.environment]
NODE_VERSION = "20"
NPM_VERSION = "10"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[[headers]]
for = "/.next/static/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/.*"
[headers.values]
X-Frame-Options = "ALLOW-FROM https://surajpatil.dev"
